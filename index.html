<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Learning Goal Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h2>Web Learning Goal Tracker</h2>

<form id="trackerForm">

<label>Name</label>
<input type="text" id="name" required>

<label>Roll Number</label>
<input type="text" id="roll" required>

<label>Weekly Study Hours</label>
<input type="number" id="hours" required>

<label>Target Web Technology</label>
<select id="technology">
<option>HTML</option>
<option>CSS</option>
<option>JavaScript</option>
<option>React</option>
</select>

<button type="submit">Check Progress</button>

</form>

<div id="output"></div>

<h3>Learning Goals</h3>
<ul id="goalList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
